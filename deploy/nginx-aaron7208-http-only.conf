# Nginx 站点配置 — HTTP 仅（初始测试用，上 HTTPS 前可先用此配置验证）
# 用法：复制到 /etc/nginx/sites-available/aaron7208
# 配置好 HTTPS 后改用 deploy/nginx-aaron7208.conf
# @see docs/27-腾讯云部署指南-www.aaron7208.cn.md §5.1

server {
    listen 80;
    server_name www.aaron7208.cn aaron7208.cn;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
