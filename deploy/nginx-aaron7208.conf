# Nginx 站点配置 — www.aaron7208.cn
# 用法：复制到服务器 /etc/nginx/sites-available/aaron7208
#       ln -sf /etc/nginx/sites-available/aaron7208 /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx
# @see docs/27-腾讯云部署指南-www.aaron7208.cn.md

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name www.aaron7208.cn aaron7208.cn;
    return 301 https://www.aaron7208.cn$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name www.aaron7208.cn aaron7208.cn;

    # 证书路径（腾讯云或 certbot 生成的证书）
    # 腾讯云：将下载的 .crt 和 .key 上传到服务器后填写实际路径
    # certbot：certbot --nginx -d www.aaron7208.cn -d aaron7208.cn 会自动配置
    ssl_certificate     /etc/nginx/ssl/aaron7208.crt;
    ssl_certificate_key /etc/nginx/ssl/aaron7208.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
