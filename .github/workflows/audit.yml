# 依赖安全审计 - 仅 critical 阻断（high 仅记录，避免误杀）
# @see docs/26-安全审查报告.md, docs/08-上线检查清单.md
name: Dependency Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # 仅 critical 导致失败；high 会打印在日志中，可本地 npm audit 处理
      - run: npm audit --audit-level=critical
